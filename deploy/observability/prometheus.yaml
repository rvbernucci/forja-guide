global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yaml

scrape_configs:
  - job_name: forjad
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:8080"]
        labels:
          service: forjad
  - job_name: forja-mcp
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:9464"]
        labels:
          service: forja-mcp
