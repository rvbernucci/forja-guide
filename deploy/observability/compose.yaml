name: forja-observability

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    depends_on:
      - tempo
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.10.5
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.12.0
    network_mode: host
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
      - "--web.listen-address=127.0.0.1:9090"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./alerts.yaml:/etc/prometheus/alerts.yaml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.2
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.16.1
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/config.alloy"]
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - ${FORJA_LOG_DIR:-/tmp/forja/logs}:/var/log/forja:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - loki
    ports:
      - "127.0.0.1:12345:12345"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0
    network_mode: host
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SERVER_HTTP_ADDR: 127.0.0.1
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

volumes:
  alloy-data:
  grafana-data:
  loki-data:
  prometheus-data:
  tempo-data:
