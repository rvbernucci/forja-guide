name: Repository quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.3-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
        env:
          POSTGRES_DB: forja_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d forja_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      qdrant:
        image: qdrant/qdrant:v1.18.2-unprivileged@sha256:b79aaa49ce7a7e5b7e9cf3fe76be400c911457084b4b7af47487c1c9ae5962e5
        env:
          QDRANT__SERVICE__API_KEY: forja-ci-qdrant-only
          QDRANT__TELEMETRY_DISABLED: "true"
        ports:
          - 6333:6333
          - 6334:6334
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14.5"

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24.18.0"
          cache: npm

      - name: Install pinned language adapter dependencies
        run: |
          test "$(node --version | cut -d. -f1)" = "v24"
          npm ci --ignore-scripts --no-audit --no-fund

      - name: Match PostgreSQL client to server
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ca-certificates curl
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl \
            --fail \
            --output /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          printf '%s\n' \
            'Types: deb' \
            'URIs: https://apt.postgresql.org/pub/repos/apt' \
            "Suites: ${VERSION_CODENAME}-pgdg" \
            "Architectures: $(dpkg --print-architecture)" \
            'Components: main' \
            'Signed-By: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc' |
          sudo tee /etc/apt/sources.list.d/pgdg.sources >/dev/null
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends postgresql-client-18
          echo '/usr/lib/postgresql/18/bin' >>"$GITHUB_PATH"
          export PATH="/usr/lib/postgresql/18/bin:$PATH"
          test "$(pg_dump --version | awk '{print $3}' | cut -d. -f1)" = "18"

      - name: Validate public repository
        env:
          FORJA_ENFORCE_TRUSTED_MAIN: "1"
          FORJA_TRUSTED_MAIN_SHA: ${{ github.event.pull_request.base.sha || github.sha }}
        run: make validate

      - name: Validate PostgreSQL durability
        env:
          FORJA_TEST_DATABASE_URL: postgres://postgres@127.0.0.1:5432/forja_test?sslmode=disable
          PGPASSWORD: postgres
        run: make test-integration

      - name: Validate live Qdrant lifecycle
        env:
          FORJA_QDRANT_API_KEY: forja-ci-qdrant-only
          FORJA_QDRANT_GRPC_PORT: "6334"
          FORJA_QDRANT_HOST: 127.0.0.1
          FORJA_QDRANT_LIVE: "1"
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              --header "api-key: ${FORJA_QDRANT_API_KEY}" \
              http://127.0.0.1:6333/readyz >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Qdrant did not become ready" >&2
              exit 1
            fi
            sleep 1
          done
          go test -count=1 ./internal/retrieval \
            -run '^TestLiveQdrantBlueGreenQueryAndDelete$'

      - name: Rehearse observability stack on clean Linux host
        env:
          FORJA_DATABASE_URL: postgres://postgres@127.0.0.1:5432/forja_test?sslmode=disable
          PGPASSWORD: postgres
        run: scripts/observability_stack_smoke.sh
